name: Deploy — Integration Suite Migration Assessment Tool

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install production dependencies ───────────────────────────────────────
      - name: Install production dependencies
        run: npm install --production

      # 4. Create deployment zip ─────────────────────────────────────────────────
      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.claude*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "deploy.zip" \
            --exclude "uploads/*"
          echo "Zip size: $(du -sh deploy.zip | cut -f1)"

      # 5. Log in to Azure ───────────────────────────────────────────────────────
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 6. Deploy to Azure App Service (Node.js 20 LTS) ─────────────────────────
      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name ${{ secrets.AZURE_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path deploy.zip \
            --type zip \
            --async true

      # 7. Set App Service startup command ──────────────────────────────────────
      - name: Configure startup command
        run: |
          az webapp config set \
            --name ${{ secrets.AZURE_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --startup-file "node server.js"
